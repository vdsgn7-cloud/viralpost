<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ViralPost Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: #2a2a38;
  --accent: #7c6aff;
  --accent2: #ff6a9b;
  --accent3: #6affd4;
  --text: #f0eff8;
  --text2: #8886a0;
  --text3: #4f4e62;
  --radius: 14px;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}
/* NOISE OVERLAY */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
}

/* AUTH SCREEN */
#auth-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px;
  position: relative; z-index: 1;
}
.auth-logo {
  font-family: var(--font-head); font-size: 28px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.auth-sub { color: var(--text2); font-size: 14px; margin-bottom: 36px; }
.auth-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
.auth-tab {
  flex: 1; padding: 8px; border: none; background: transparent; color: var(--text2);
  border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 14px; font-weight: 500; transition: all .2s;
}
.auth-tab.active { background: var(--accent); color: #fff; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }
.field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: var(--font-body); font-size: 15px;
  outline: none; transition: border-color .2s;
}
.field input:focus { border-color: var(--accent); }

.btn-primary {
  width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none;
  border-radius: 12px; font-family: var(--font-head); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .2s; letter-spacing: .02em;
}
.btn-primary:hover { opacity: .9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text3); font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.btn-google {
  width: 100%; padding: 13px; background: transparent; color: var(--text);
  border: 1px solid var(--border); border-radius: 12px; font-family: var(--font-body); font-size: 15px;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-google:hover { border-color: var(--accent); background: var(--surface2); }
.msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 14px; display: none; }
.msg.error { background: rgba(255,100,100,.12); color: #ff7070; border: 1px solid rgba(255,100,100,.2); display: block; }
.msg.success { background: rgba(106,255,212,.12); color: var(--accent3); border: 1px solid rgba(106,255,212,.2); display: block; }

/* APP LAYOUT */
#app { display: none; min-height: 100vh; position: relative; z-index: 1; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 60px; border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,.8); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: var(--font-head); font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav { display: flex; gap: 4px; }
.nav-btn {
  padding: 7px 16px; border: none; background: transparent; color: var(--text2);
  border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 14px; transition: all .2s;
}
.nav-btn:hover { color: var(--text); background: var(--surface2); }
.nav-btn.active { color: var(--accent); background: rgba(124,106,255,.12); }
.user-area { display: flex; align-items: center; gap: 12px; }
.user-name { font-size: 13px; color: var(--text2); }
.btn-logout { padding: 6px 14px; border: 1px solid var(--border); background: transparent; color: var(--text2); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all .2s; }
.btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

/* PAGES */
.page { display: none; padding: 32px 28px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; }

/* GENERATOR PAGE */
.gen-grid { display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }
@media (max-width: 900px) { .gen-grid { grid-template-columns: 1fr; } }

.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px;
}
.panel-title { font-family: var(--font-head); font-size: 15px; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.panel-title span { font-size: 18px; }

.form-row { margin-bottom: 16px; }
.form-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: var(--font-body); font-size: 14px;
  outline: none; transition: border-color .2s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
.form-row select option { background: var(--surface2); }
.form-row textarea { resize: vertical; min-height: 80px; }

/* SEGMENTED CONTROL */
.seg { display: flex; background: var(--surface2); border-radius: 10px; padding: 3px; gap: 2px; }
.seg-btn {
  flex: 1; padding: 8px 6px; border: none; background: transparent; color: var(--text2);
  border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .2s; text-align: center;
}
.seg-btn.active { background: var(--accent); color: #fff; }

/* UPLOAD AREA */
.upload-area {
  border: 2px dashed var(--border); border-radius: 12px; padding: 20px;
  text-align: center; cursor: pointer; transition: all .2s; position: relative;
}
.upload-area:hover { border-color: var(--accent); background: rgba(124,106,255,.05); }
.upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-text { color: var(--text2); font-size: 13px; }
.upload-preview { width: 100%; max-height: 120px; object-fit: cover; border-radius: 8px; display: none; }

/* TRENDS */
.trend-item {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: all .2s;
}
.trend-item:hover, .trend-item.selected { border-color: var(--accent); background: rgba(124,106,255,.08); }
.trend-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.trend-desc { font-size: 12px; color: var(--text2); }
.trend-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.badge {
  font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: .04em;
}
.badge-alto { background: rgba(106,255,212,.12); color: var(--accent3); border: 1px solid rgba(106,255,212,.2); }
.badge-medio { background: rgba(255,196,0,.1); color: #ffc400; border: 1px solid rgba(255,196,0,.2); }
.badge-tipo { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }

/* CARD PREVIEW */
.card-wrap { position: sticky; top: 80px; }
#post-card {
  border-radius: 16px; overflow: hidden; min-height: 400px;
  display: flex; flex-direction: column; justify-content: center;
  padding: 40px 36px; position: relative;
  transition: all .4s ease;
}
.card-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 400px; color: var(--text3); text-align: center; gap: 12px;
}
.card-placeholder-icon { font-size: 40px; opacity: .4; }

.card-slides { display: flex; flex-direction: column; gap: 0; }
.slide { padding: 36px; min-height: 360px; display: flex; flex-direction: column; justify-content: center; position: relative; }
.slide + .slide { border-top: 1px solid rgba(255,255,255,.1); }
.slide-num { font-size: 11px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 16px; opacity: .5; }

.card-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.btn-action {
  padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 13px; font-weight: 500; transition: all .2s;
}
.btn-dl { background: var(--accent); color: #fff; }
.btn-dl:hover { opacity: .9; }
.btn-save { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
.btn-save:hover { border-color: var(--accent3); color: var(--accent3); }
.btn-plan { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
.btn-plan:hover { border-color: var(--accent2); color: var(--accent2); }

/* CAPTION OUTPUT */
.caption-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; margin-top: 16px; white-space: pre-wrap; font-size: 14px; line-height: 1.7;
}
.hashtags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.hashtag { font-size: 12px; color: var(--accent); background: rgba(124,106,255,.1); padding: 3px 10px; border-radius: 20px; }

/* LOADER */
.loader { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* PLANNER PAGE */
.planner-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.month-nav { display: flex; align-items: center; gap: 16px; }
.month-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.month-btn:hover { border-color: var(--accent); color: var(--accent); }
.month-label { font-family: var(--font-head); font-size: 20px; font-weight: 700; min-width: 200px; text-align: center; }

.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-header { text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); padding: 8px 0; letter-spacing: .08em; text-transform: uppercase; }
.cal-day {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  min-height: 90px; padding: 8px; cursor: pointer; transition: all .2s; position: relative;
}
.cal-day:hover { border-color: var(--accent); }
.cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-day.today { border-color: var(--accent); background: rgba(124,106,255,.06); }
.cal-day-num { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.cal-day.today .cal-day-num { color: var(--accent); }
.cal-post {
  font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
}
.cal-post.agendado { background: rgba(124,106,255,.2); color: #a89fff; }
.cal-post.publicado { background: rgba(106,255,212,.15); color: var(--accent3); }
.cal-post.rascunho { background: var(--surface2); color: var(--text3); }

/* HISTORY PAGE */
.history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.history-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 20px; transition: all .2s; cursor: pointer;
}
.history-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.history-headline { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.history-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.history-copy { font-size: 13px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.history-date { font-size: 11px; color: var(--text3); margin-top: 10px; }

/* MODAL */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px;
  display: none;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 32px; width: 100%; max-width: 480px; position: relative;
}
.modal-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.modal-close { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: none; color: var(--text2); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px; }

/* EMPTY STATE */
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
.empty p { font-size: 14px; }

/* UTIL */
.flex { display: flex; align-items: center; }
.gap-8 { gap: 8px; }
.mt-16 { margin-top: 16px; }
.hidden { display: none !important; }
.spin { animation: spin .7s linear infinite; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">ViralPost Studio</div>
    <div class="auth-sub">Crie posts virais com IA em segundos</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('signup')">Criar conta</button>
    </div>

    <div id="tab-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="seu@email.com"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-pass" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
      <div id="login-msg" class="msg"></div>
    </div>

    <div id="tab-signup" class="hidden">
      <div class="field">
        <label>Nome</label>
        <input type="text" id="signup-name" placeholder="Seu nome"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="seu@email.com"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="signup-pass" placeholder="mínimo 6 caracteres"/>
      </div>
      <button class="btn-primary" onclick="doSignup()">Criar conta</button>
      <div id="signup-msg" class="msg"></div>
    </div>

    <div class="divider">ou</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Entrar com Google
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="logo">ViralPost</div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showPage('generator')">Criar Post</button>
      <button class="nav-btn" onclick="showPage('planner')">Planner</button>
      <button class="nav-btn" onclick="showPage('history')">Histórico</button>
    </nav>
    <div class="user-area">
      <span class="user-name" id="user-name"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <!-- GENERATOR PAGE -->
  <div id="page-generator" class="page active">
    <div class="gen-grid">

      <!-- LEFT: FORM -->
      <div>
        <!-- Step 1: Config -->
        <div class="panel" style="margin-bottom:16px">
          <div class="panel-title"><span>⚡</span> Configuração</div>

          <div class="form-row">
            <label>Nicho / Tema</label>
            <input type="text" id="inp-nicho" placeholder="ex: investimentos, fitness, marketing"/>
          </div>

          <div class="form-row">
            <label>Rede Social</label>
            <div class="seg" id="seg-rede">
              <button class="seg-btn active" data-val="instagram">Instagram</button>
              <button class="seg-btn" data-val="linkedin">LinkedIn</button>
              <button class="seg-btn" data-val="twitter">Twitter/X</button>
            </div>
          </div>

          <div class="form-row">
            <label>Formato</label>
            <div class="seg" id="seg-formato">
              <button class="seg-btn active" data-val="estatico">Estático</button>
              <button class="seg-btn" data-val="carrossel">Carrossel</button>
              <button class="seg-btn" data-val="thread">Thread</button>
            </div>
          </div>

          <div class="form-row">
            <label>Screenshot de referência (opcional)</label>
            <div class="upload-area" id="upload-area">
              <input type="file" id="inp-image" accept="image/*" onchange="handleImageUpload(this)"/>
              <div class="upload-text" id="upload-text">
                Clique ou arraste uma imagem aqui<br>
                <span style="font-size:11px;color:var(--text3)">A IA vai clonar o estilo visual</span>
              </div>
              <img class="upload-preview" id="upload-preview"/>
            </div>
          </div>

          <button class="btn-primary" onclick="fetchTrends()" id="btn-trends">
            Buscar tendências →
          </button>
        </div>

        <!-- Step 2: Trends -->
        <div class="panel" id="panel-trends" style="display:none;margin-bottom:16px">
          <div class="panel-title"><span>🔥</span> Em alta agora</div>
          <div id="trends-list"></div>
          <button class="btn-primary" onclick="generatePost()" id="btn-generate" style="margin-top:16px">
            Gerar post viral →
          </button>
        </div>
      </div>

      <!-- RIGHT: PREVIEW -->
      <div class="card-wrap">
        <div class="panel">
          <div class="panel-title"><span>✨</span> Preview</div>
          <div id="post-card">
            <div class="card-placeholder">
              <div class="card-placeholder-icon">🎨</div>
              <p>Seu post aparece aqui</p>
            </div>
          </div>
          <div id="card-actions" class="card-actions hidden">
            <button class="btn-action btn-dl" onclick="downloadCard()">⬇ Baixar PNG</button>
            <button class="btn-action btn-save" onclick="savePost()">💾 Salvar</button>
            <button class="btn-action btn-plan" onclick="openPlanModal()">📅 Agendar</button>
          </div>
          <div id="caption-out" class="hidden">
            <div class="caption-box" id="caption-text"></div>
            <div class="hashtags-row" id="hashtags-row"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PLANNER PAGE -->
  <div id="page-planner" class="page">
    <div class="planner-header">
      <div class="month-nav">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="month-label"></div>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
      <button class="btn-action btn-plan" onclick="openPlanModal()">+ Novo agendamento</button>
    </div>
    <div class="calendar" id="calendar-grid"></div>
  </div>

  <!-- HISTORY PAGE -->
  <div id="page-history" class="page">
    <div style="margin-bottom:20px;font-family:var(--font-head);font-size:22px;font-weight:800">Histórico de posts</div>
    <div class="history-grid" id="history-grid">
      <div class="empty"><div class="empty-icon">📂</div><p>Nenhum post salvo ainda</p></div>
    </div>
  </div>
</div>

<!-- PLAN MODAL -->
<div class="modal-bg" id="plan-modal">
  <div class="modal">
    <button class="modal-close" onclick="closePlanModal()">×</button>
    <div class="modal-title">📅 Agendar post</div>
    <div class="form-row">
      <label>Data</label>
      <input type="date" id="plan-date"/>
    </div>
    <div class="form-row">
      <label>Horário (opcional)</label>
      <input type="time" id="plan-time"/>
    </div>
    <div class="form-row">
      <label>Rede Social</label>
      <select id="plan-rede">
        <option value="instagram">Instagram</option>
        <option value="linkedin">LinkedIn</option>
        <option value="twitter">Twitter/X</option>
      </select>
    </div>
    <div class="form-row">
      <label>Notas</label>
      <textarea id="plan-notas" placeholder="Observações sobre o post..."></textarea>
    </div>
    <button class="btn-primary" onclick="schedulePost()">Agendar</button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────
const SUPABASE_URL = 'https://dgkojjevagjftgzffuhq.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_isg_vHTC7C4y-eAYQtXoAA_YLnhC6R6';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── STATE ────────────────────────────────────────
let currentUser = null;
let currentSession = null;
let currentStyle = null;
let currentPost = null;
let currentTrend = null;
let plannerDate = new Date();
let imageBase64 = null;
let imageMediaType = 'image/jpeg';

// ─── INIT ─────────────────────────────────────────
sb.auth.onAuthStateChange((event, session) => {
  currentSession = session;
  currentUser = session?.user || null;
  if (currentUser) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || '';
    renderPlanner();
    loadHistory();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ─── AUTH ─────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login')===!i));
  document.getElementById('tab-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('tab-signup').classList.toggle('hidden', tab === 'login');
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const msg = document.getElementById('login-msg');
  msg.className = 'msg'; msg.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { msg.className = 'msg error'; msg.textContent = error.message; }
}

async function doSignup() {
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const pass = document.getElementById('signup-pass').value;
  const msg = document.getElementById('signup-msg');
  msg.className = 'msg'; msg.textContent = '';
  const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
  if (error) { msg.className = 'msg error'; msg.textContent = error.message; }
  else { msg.className = 'msg success'; msg.textContent = 'Conta criada! Verifique seu email.'; }
}

async function doGoogle() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
}

async function doLogout() {
  await sb.auth.signOut();
}

// ─── NAVIGATION ───────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  event.target.classList.add('active');
  if (page === 'planner') renderPlanner();
  if (page === 'history') loadHistory();
}

// ─── SEGMENTED CONTROLS ───────────────────────────
document.querySelectorAll('.seg').forEach(seg => {
  seg.querySelectorAll('.seg-btn').forEach(btn => {
    btn.onclick = () => {
      seg.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });
});
function getSegValue(id) {
  return document.querySelector(`#${id} .seg-btn.active`)?.dataset.val || '';
}

// ─── IMAGE UPLOAD ─────────────────────────────────
function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  imageMediaType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    const result = e.target.result;
    imageBase64 = result.split(',')[1];
    const prev = document.getElementById('upload-preview');
    prev.src = result; prev.style.display = 'block';
    document.getElementById('upload-text').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ─── STEP 1: TRENDS ───────────────────────────────
async function fetchTrends() {
  const nicho = document.getElementById('inp-nicho').value.trim();
  if (!nicho) { alert('Preencha o nicho'); return; }
  const btn = document.getElementById('btn-trends');
  btn.innerHTML = '<span class="loader"></span> Buscando...';
  btn.disabled = true;

  // Analyze style in parallel if image uploaded
  if (imageBase64) {
    analyzeStyle().catch(console.error);
  }

  try {
    const res = await fetch('/api/trends', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nicho, redeSocial: getSegValue('seg-rede') })
    });
    const data = await res.json();
    renderTrends(data.trends || []);
  } catch (e) {
    alert('Erro ao buscar tendências: ' + e.message);
  } finally {
    btn.innerHTML = 'Buscar tendências →';
    btn.disabled = false;
  }
}

async function analyzeStyle() {
  if (!imageBase64) return;
  const res = await fetch('/api/analyze-style', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imageBase64, mediaType: imageMediaType })
  });
  const data = await res.json();
  currentStyle = data.style;
}

function renderTrends(trends) {
  const panel = document.getElementById('panel-trends');
  const list = document.getElementById('trends-list');
  panel.style.display = 'block';
  list.innerHTML = '';
  trends.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'trend-item';
    el.innerHTML = `
      <div class="trend-title">${t.titulo}</div>
      <div class="trend-desc">${t.descricao}</div>
      <div class="trend-badges">
        <span class="badge badge-${t.potencial}">${t.potencial === 'alto' ? '🔥 Alto potencial' : '📈 Médio potencial'}</span>
        <span class="badge badge-tipo">${t.tipo}</span>
      </div>
    `;
    el.onclick = () => {
      document.querySelectorAll('.trend-item').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      currentTrend = t;
    };
    list.appendChild(el);
  });
  if (trends.length) {
    list.children[0].click();
  }
}

// ─── STEP 2: GENERATE ─────────────────────────────
async function generatePost() {
  if (!currentTrend) { alert('Selecione uma tendência'); return; }
  const nicho = document.getElementById('inp-nicho').value.trim();
  const redeSocial = getSegValue('seg-rede');
  const formato = getSegValue('seg-formato');
  const btn = document.getElementById('btn-generate');
  btn.innerHTML = '<span class="loader"></span> Gerando post...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nicho, redeSocial, formato,
        tema: currentTrend.titulo + ' — ' + currentTrend.angulo,
        estiloVisual: currentStyle
      })
    });
    const data = await res.json();
    currentPost = data;
    renderCard(data);
  } catch (e) {
    alert('Erro ao gerar post: ' + e.message);
  } finally {
    btn.innerHTML = 'Gerar post viral →';
    btn.disabled = false;
  }
}

// ─── RENDER CARD ──────────────────────────────────
function renderCard(data) {
  const { post, formato } = data;
  const style = currentStyle;
  const card = document.getElementById('post-card');

  const bg = style?.palette?.background || '#0f0f1a';
  const primary = style?.palette?.primary || '#7c6aff';
  const textColor = style?.palette?.text || '#ffffff';
  const accent = style?.palette?.accent || '#ff6a9b';
  const radius = { none:'0px', small:'8px', medium:'16px', large:'28px', pill:'40px' }[style?.borderRadius] || '16px';
  const headFont = style?.typography?.headingStyle === 'serif' ? 'Georgia, serif' : "'Syne', sans-serif";

  card.style.cssText = `background:${bg};border-radius:${radius};min-height:400px;padding:40px 36px;display:flex;flex-direction:column;justify-content:center;`;

  if (formato === 'estatico') {
    card.innerHTML = `
      <div style="font-size:32px;margin-bottom:16px">${post.emoji_abertura || ''}</div>
      <div style="font-family:${headFont};font-size:26px;font-weight:800;color:${textColor};line-height:1.2;margin-bottom:20px">${post.headline}</div>
      <div style="color:${textColor};opacity:.75;font-size:14px;line-height:1.7;white-space:pre-wrap;margin-bottom:24px">${post.copy}</div>
      <div style="background:${primary};color:#fff;display:inline-block;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:700;align-self:flex-start">${post.cta}</div>
    `;
    showCaption(post.copy, post.hashtags);
  }

  if (formato === 'carrossel') {
    const slides = post.slides || [];
    card.style.padding = '0';
    card.innerHTML = `<div class="card-slides">${slides.map((s,i) => `
      <div class="slide" style="background:${i===0?primary:bg};min-height:360px;padding:36px;display:flex;flex-direction:column;justify-content:center">
        <div style="font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:${textColor};opacity:.4;margin-bottom:12px">Slide ${s.numero}/${slides.length}</div>
        <div style="font-family:${headFont};font-size:${i===0?'28px':'22px'};font-weight:800;color:${textColor};line-height:1.2;margin-bottom:${s.corpo?'14px':'0'}">${s.titulo}</div>
        ${s.subtitulo ? `<div style="color:${textColor};opacity:.6;font-size:14px;margin-top:8px">${s.subtitulo}</div>` : ''}
        ${s.corpo ? `<div style="color:${textColor};opacity:.75;font-size:14px;line-height:1.6;margin-top:10px">${s.corpo}</div>` : ''}
        ${s.tipo==='cta' ? `<div style="background:${accent};color:#fff;display:inline-block;margin-top:20px;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:700;align-self:flex-start">Seguir para mais ↓</div>` : ''}
      </div>
    `).join('')}</div>`;
    showCaption(post.caption, post.hashtags);
  }

  if (formato === 'thread') {
    const tweets = post.tweets || [];
    card.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px">${tweets.map((t,i) => `
      <div style="background:${i===0?primary:bg.replace('#','rgba(') + ',0.5)'};border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 18px">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:${textColor};opacity:.35;margin-bottom:6px">${i===0?'🔥 TWEET ABERTURA':'Tweet ' + t.numero}</div>
        <div style="color:${textColor};font-size:14px;line-height:1.6">${t.texto}</div>
      </div>
    `).join('')}</div>`;
    showCaption(tweets.map(t => t.texto).join('\n\n'), post.hashtags);
  }

  document.getElementById('card-actions').classList.remove('hidden');
}

function showCaption(text, hashtags) {
  const out = document.getElementById('caption-out');
  out.classList.remove('hidden');
  document.getElementById('caption-text').textContent = text;
  const row = document.getElementById('hashtags-row');
  row.innerHTML = (hashtags || []).map(h => `<span class="hashtag">#${h.replace(/^#/,'')}</span>`).join('');
}

// ─── DOWNLOAD ─────────────────────────────────────
async function downloadCard() {
  const card = document.getElementById('post-card');
  const canvas = await html2canvas(card, { backgroundColor: null, scale: 2 });
  const link = document.createElement('a');
  link.download = 'viralpost.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ─── SAVE ─────────────────────────────────────────
async function savePost() {
  if (!currentPost || !currentSession) return;
  const { post, formato, nicho, redeSocial } = currentPost;
  try {
    const res = await fetch('/api/save-post', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentSession.access_token },
      body: JSON.stringify({
        nicho, redeSocial, formato,
        headline: post.headline || post.tweets?.[0]?.texto || '',
        copy: post.copy || post.caption || '',
        slides: post.slides || post.tweets || null,
        hashtags: post.hashtags || [],
        estiloVisual: currentStyle
      })
    });
    const data = await res.json();
    if (data.post) alert('Post salvo! ✅');
    else alert('Erro ao salvar');
  } catch (e) { alert('Erro: ' + e.message); }
}

// ─── PLANNER ──────────────────────────────────────
let plannerItems = [];

async function renderPlanner() {
  const year = plannerDate.getFullYear();
  const month = plannerDate.getMonth() + 1;
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('month-label').textContent = `${months[month-1]} ${year}`;

  if (!currentSession) return;
  const res = await fetch(`/api/planner?month=${month}&year=${year}`, {
    headers: { 'Authorization': 'Bearer ' + currentSession.access_token }
  });
  const data = await res.json();
  plannerItems = data.items || [];
  buildCalendar(year, month);
}

function changeMonth(dir) {
  plannerDate.setMonth(plannerDate.getMonth() + dir);
  renderPlanner();
}

function buildCalendar(year, month) {
  const grid = document.getElementById('calendar-grid');
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const firstDay = new Date(year, month-1, 1).getDay();
  const totalDays = new Date(year, month, 0).getDate();
  const today = new Date();

  let html = days.map(d => `<div class="cal-header">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

  for (let d = 1; d <= totalDays; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===year && today.getMonth()===month-1 && today.getDate()===d;
    const dayItems = plannerItems.filter(i => i.scheduled_date === dateStr);
    const postsHtml = dayItems.map(i => {
      const headline = i.generated_posts?.headline || 'Post';
      return `<div class="cal-post ${i.status}" title="${headline}">${headline}</div>`;
    }).join('');
    html += `
      <div class="cal-day ${isToday?'today':''}" onclick="openPlanModalDate('${dateStr}')">
        <div class="cal-day-num">${d}</div>
        ${postsHtml}
      </div>`;
  }
  grid.innerHTML = html;
}

function openPlanModal() {
  document.getElementById('plan-modal').classList.add('open');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('plan-date').value = today;
}

function openPlanModalDate(date) {
  document.getElementById('plan-modal').classList.add('open');
  document.getElementById('plan-date').value = date;
}

function closePlanModal() {
  document.getElementById('plan-modal').classList.remove('open');
}

async function schedulePost() {
  if (!currentSession) return;
  const scheduledDate = document.getElementById('plan-date').value;
  const scheduledTime = document.getElementById('plan-time').value;
  const redeSocial = document.getElementById('plan-rede').value;
  const notas = document.getElementById('plan-notas').value;
  if (!scheduledDate) { alert('Selecione a data'); return; }

  const body = {
    scheduledDate, scheduledTime, redeSocial, notas,
    postId: currentPost ? null : null
  };

  const res = await fetch('/api/planner', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentSession.access_token },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.item) {
    closePlanModal();
    renderPlanner();
    alert('Agendado! ✅');
  }
}

// ─── HISTORY ──────────────────────────────────────
async function loadHistory() {
  if (!currentSession) return;
  const { data, error } = await sb
    .from('generated_posts')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false })
    .limit(50);

  const grid = document.getElementById('history-grid');
  if (!data || !data.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><p>Nenhum post salvo ainda</p></div>';
    return;
  }

  const redeIcon = { instagram:'📸', linkedin:'💼', twitter:'🐦' };
  const formatoLabel = { estatico:'Estático', carrossel:'Carrossel', thread:'Thread' };

  grid.innerHTML = data.map(p => `
    <div class="history-card">
      <div class="history-headline">${p.headline || 'Post'}</div>
      <div class="history-meta">
        <span class="badge badge-tipo">${redeIcon[p.rede_social]||''} ${p.rede_social}</span>
        <span class="badge badge-tipo">${formatoLabel[p.formato]||p.formato}</span>
        <span class="badge badge-tipo">${p.nicho}</span>
      </div>
      <div class="history-copy">${p.copy || ''}</div>
      <div class="history-date">${new Date(p.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'})}</div>
    </div>
  `).join('');
}
</script>
